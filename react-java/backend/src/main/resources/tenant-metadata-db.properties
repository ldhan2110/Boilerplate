# Metadata Database Configuration (stores tenant connection information)
# This file can be easily adjusted for different environments
tenant.metadata.db.driver-class-name=org.postgresql.Driver
tenant.metadata.db.url=jdbc:postgresql://10.0.0.85:5433/erp-tenant
tenant.metadata.db.username=postgres
tenant.metadata.db.password=postgres

# Connection Pool Settings for Metadata DB
tenant.metadata.db.hikari.pool-name=MetadataDBPool
tenant.metadata.db.hikari.minimum-idle=2
tenant.metadata.db.hikari.maximum-pool-size=10
tenant.metadata.db.hikari.connection-timeout=30000
tenant.metadata.db.hikari.idle-timeout=600000
tenant.metadata.db.hikari.max-lifetime=1800000
