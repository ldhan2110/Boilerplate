# ===============================
# =  PAYSLIP EMAIL DISPATCH
# ===============================
# Google Workspace: ~2,000 emails/day ≈ safe at 1 email/s (1000ms delay)
# Increase batch-size and reduce delay only if SMTP provider allows higher throughput.
# If increase batch-size, increase stale-threshold-minutes too
payslip.email.batch-size=100
payslip.email.rate-limit-delay-ms=1000
# Delay (ms) between batch cycles — gives Google SMTP breathing room between batches
payslip.email.batch-rate-limit-delay-ms=90000
# Recovery scheduler interval (ms): runs every 15 minutes
payslip.email.recovery-interval-ms=900000
# Rows stuck in PROCESSING longer than this (minutes) are considered crashed and reset to QUEUED
payslip.email.stale-threshold-minutes=20
# List of tenant IDs to process recovery payslip emails for
payslip.email.recovery.tenants=SAMBU
# Max rows per INSERT chunk. Each payslip HTML ~20-50KB, so 200 chunks ≈ 4-10MB per statement.
# Lower this if you observe statement-size timeouts; raise it to reduce the number of round-trips.
payslip.email.insert-chunk-size=200
payslip.email.smtp-connect-max-attempts=3
payslip.email.smtp-connect-base-delay-ms=5000
